# Model arguments
model_name_or_path: ../../huggingface/models/gpt2
model_revision: main
torch_dtype: bfloat16
attn_implementation: eager
trust_remote_code: true

# Data training arguments
# dataset_name: ../../huggingface/datasets/Zyphra_Zyda.zyda_slimpajama_only
# dataset_output_path: exp_llm/data/gpt2/ids_slimpajama
# dataset_train_size: 0.01
dataset_name: ../../huggingface/datasets/bookcorpus_bookcorpus
dataset_output_path: exp_llm/data/gpt2/ids_bookcorpus
dataset_train_size: null
dataset_test_size: 10000
dataset_train_split: train
dataset_test_split: test
dataset_num_proc: 16

# SFT trainer config
bf16: true
do_eval: true
eval_strategy: steps
eval_steps: 200
eval_on_start: true
gradient_accumulation_steps: 1
gradient_checkpointing: false
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 2.0e-05
log_level: info
logging_steps: 20
logging_strategy: steps
lr_scheduler_type: cosine
max_length: 1024
packing: true
packing_strategy: wrapped
max_steps: -1
num_train_epochs: 1
output_dir: exp_llm/output/gpt2
overwrite_output_dir: true
per_device_eval_batch_size: 8
per_device_train_batch_size: 8
push_to_hub: false
remove_unused_columns: true
report_to: tensorboard
save_strategy: "steps"
save_steps: 1000
save_total_limit: 1
seed: 42
warmup_steps: 500
